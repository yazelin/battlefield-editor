<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:radial-gradient(120% 100% at 50% -20%,#1b1408 0%,#0c0a07 52%,#08070a 100%);
    color:#ece4d2;font-family:'Noto Serif TC',serif;position:relative;
    display:flex;flex-direction:column;justify-content:center;padding:0 86px}
  .grain{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(90deg,#c9a24a 0 1px,transparent 1px 64px),repeating-linear-gradient(0deg,#c9a24a 0 1px,transparent 1px 64px)}
  .tag{font-size:21px;letter-spacing:11px;color:#c9a24a;margin-bottom:24px}
  h1{font-size:104px;font-weight:900;letter-spacing:14px;line-height:1;margin-bottom:30px;text-shadow:0 6px 40px rgba(0,0,0,.6)}
  .sub{font-size:27px;font-weight:300;color:#cdc4ad;letter-spacing:3px;line-height:1.6;max-width:900px}
  .seals{display:flex;gap:16px;margin-top:40px}
  .seal{width:74px;height:74px;border:2px solid #c9a24a;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:40px;font-weight:900;color:#c9a24a;background:rgba(201,162,77,.08)}
  .seal small{display:none}
  .foot{position:absolute;left:86px;bottom:46px;font-size:22px;letter-spacing:3px;color:#9c8645}
  .badge{position:absolute;right:86px;bottom:46px;font-size:20px;letter-spacing:2px;color:#cdc4ad;border:1px solid rgba(201,162,77,.4);border-radius:8px;padding:9px 18px;background:rgba(201,162,77,.06)}
</style></head>
<body>
  <div class="grain"></div>
  <div class="tag">資 料 驅 動 ・ 3D 歷 史 戰 場 引 擎</div>
  <h1>AI 戰場編輯器</h1>
  <div class="sub">每一場戰役都是一份資料 —— AI 編寫、引擎演出、人驗收。</div>
  <div class="seals"><div class="seal">赤</div><div class="seal">官</div><div class="seal">楚</div><div class="seal">秦</div></div>
  <div class="foot">yazelin.github.io/battlefield-editor</div>
  <div class="badge">線上可看 ・ 開源可編</div>
</body></html>
