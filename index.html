<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 戰場編輯器 — 戰場列表</title>
<meta name="description" content="資料驅動的 3D 歷史戰場引擎:赤壁、官渡、垓下、淝水…換一份資料就換一場戰役。AI 編寫、引擎演出、人驗收;本機可編輯。">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0a07;--panel:rgba(24,21,15,.72);--line:rgba(201,162,77,.28);--gold:#c9a24a;--gold-dim:#9c8645;--paper:#ece4d2;--paper-dim:#b6ac92}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 90% at 50% -10%,#161208 0%,#0c0a07 55%,#08070a 100%);color:var(--paper);
  font-family:'Noto Serif TC',serif;min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1120px;margin:0 auto;padding:64px 24px 80px}
header{text-align:center;margin-bottom:46px}
.tag{font-size:12px;letter-spacing:6px;color:var(--gold);margin-bottom:14px}
h1{font-weight:900;font-size:clamp(30px,5vw,46px);letter-spacing:8px;margin:0 0 14px}
.sub{color:var(--paper-dim);font-weight:300;font-size:15px;line-height:1.9;max-width:640px;margin:0 auto;letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:18px;margin-top:8px}
a.card{display:block;text-decoration:none;color:inherit;background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:22px 22px 20px;backdrop-filter:blur(8px);transition:transform .18s,border-color .18s,box-shadow .18s;position:relative;overflow:hidden}
a.card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 14px 40px rgba(0,0,0,.5)}
.seal{position:absolute;right:16px;top:14px;width:38px;height:38px;border:1px solid var(--gold);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:var(--gold);background:rgba(201,162,77,.08)}
.cname{font-weight:700;font-size:23px;letter-spacing:3px;margin:2px 0 6px;padding-right:46px}
.cera{font-size:11.5px;letter-spacing:2px;color:var(--gold-dim);margin-bottom:12px}
.cdesc{font-size:12.5px;line-height:1.8;color:var(--paper-dim);font-weight:300;min-height:66px}
.cgo{margin-top:14px;font-size:12px;letter-spacing:2px;color:var(--gold)}
footer{margin-top:48px;text-align:center;color:var(--paper-dim);font-size:12px;line-height:2;letter-spacing:1px}
footer code{background:rgba(201,162,77,.1);border:1px solid var(--line);border-radius:4px;padding:2px 7px;color:var(--paper);font-family:ui-monospace,monospace;font-size:11.5px}
footer a{color:var(--gold)}
.loading{text-align:center;color:var(--paper-dim);letter-spacing:3px;padding:40px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="tag">歷史特別節目・全 3D 戰場重現</div>
    <h1>AI 戰場編輯器</h1>
    <div class="sub">每一場戰役都是一份資料 package,引擎只負責演出。換一份資料,就換一場戰役。<br>挑一場觀看 —— 不只赤壁,還有官渡、垓下、淝水。本機亦可編輯。</div>
  </header>
  <div class="grid" id="grid"><div class="loading">載 入 戰 場 列 表 ⋯</div></div>
  <footer>
    AI 編寫資料、引擎演出、人驗收 —— 想自己編一場戰役?本機跑 <code>node tools/editor-server.mjs</code> 即可在瀏覽器就地編輯。<br>
    原始碼與說明見 <a href="https://github.com/yazelin/battlefield-editor">GitHub</a>。
  </footer>
</div>
<script>
(async () => {
  const grid = document.getElementById('grid');
  let slugs = [];
  try { slugs = await (await fetch('packages/index.json')).json(); }
  catch { grid.innerHTML = '<div class="loading">找不到 packages/index.json</div>'; return; }
  const cards = await Promise.all(slugs.map(async slug => {
    try {
      const m = await (await fetch(`packages/${slug}/battlefield.json`)).json();
      const meta = m.meta || {};
      return { slug, name: meta.title || m.name || slug, era: meta.eraYear || m.era || '',
        desc: m.description || '', seal: meta.seal || (meta.title || m.name || slug).slice(0, 1) };
    } catch { return null; }
  }));
  const live = cards.filter(Boolean);
  if (!live.length) { grid.innerHTML = '<div class="loading">尚無可載入的戰場</div>'; return; }
  grid.innerHTML = live.map(c => `
    <a class="card" href="play.html?pkg=packages/${c.slug}/battlefield.json">
      <div class="seal">${c.seal}</div>
      <div class="cname">${c.name}</div>
      <div class="cera">${c.era}</div>
      <div class="cdesc">${c.desc}</div>
      <div class="cgo">進入戰場 →</div>
    </a>`).join('');
})();
</script>
</body>
</html>
